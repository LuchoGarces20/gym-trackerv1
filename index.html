<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#a1c4fd"> <title>GymProgress Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer crossorigin="anonymous"></script>
    <style>
        /* FONDO ANIMADO PARA RESALTAR EL LIQUID GLASS */
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px 16px; 
            max-width: 500px; 
            margin: auto; 
            color: #1d1d1f;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* EFECTO LIQUID GLASS */
        .card { 
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); 
        }

        h1 { font-size: 28px; font-weight: 800; margin: 0; color: #000; letter-spacing: -0.5px;}
        h2 { font-size: 18px; margin-bottom: 15px; font-weight: 700;}
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            background: rgba(255, 255, 255, 0.6); 
            font-size: 16px; 
            box-sizing: border-box; 
            color: #1d1d1f;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.3);
        }

        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 14px; 
            border: none; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            margin-bottom: 10px; 
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        button:active { transform: scale(0.98); }

        .btn-blue { background: #007AFF; color: white; }
        .btn-gray { background: rgba(255,255,255,0.7); color: #007AFF; border: 1px solid rgba(255,255,255,0.9); }
        .btn-green { background: #34C759; color: white; }
        .btn-red { background: #FF3B30; color: white; margin-top: 10px; }
        
        .log-item { padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 15px; }
        .log-item:last-child { border-bottom: none; }
        .badge { display: inline-block; background: rgba(0, 122, 255, 0.1); color: #007AFF; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 6px; }
        .nota-text { display: block; font-size: 13px; color: #666; font-style: italic; margin-top: 4px; }
        
        .flex-row { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h1>GymProgress</h1>
        <select id="selectorIdioma" aria-label="Seleccionar idioma" onchange="cambiarIdioma()" style="width: auto; margin: 0; background: transparent; border: none; box-shadow: none; font-weight: bold;">
            <option value="es">🇪🇸 ES</option>
            <option value="pt">🇧🇷 PT</option>
            <option value="en">🇺🇸 EN</option>
        </select>
    </div>

    <div class="card">
        <div class="flex-row">
            <select id="perfilUsuario" aria-label="Perfil de usuario" onchange="actualizarPantallas()" style="margin: 0;">
                <option value="usuario1" id="nombre_usuario1">Perfil 1</option>
                <option value="usuario2" id="nombre_usuario2">Perfil 2</option>
            </select>
            <button class="btn-gray" style="width: 50px; margin: 0; padding: 14px;" onclick="renombrarPerfil()">📝</button>
        </div>
        <select id="gimnasioActual" aria-label="Gimnasio actual" onchange="actualizarPantallas()" style="margin-top: 12px; margin-bottom: 0;">
            <option value="Skyfit">Skyfit (SJC)</option>
            <option value="Panobianco">Panobianco (CPQ)</option>
            <option value="Calabria">Calabria (Campinas)</option>
        </select>
    </div>

    <div class="card">
        <h2 data-i18n="registrar">Log Set</h2>
        <div class="flex-row">
            <select id="ejercicioSelect" aria-label="Seleccionar ejercicio" onchange="mostrarUltimoEntreno()" style="margin-bottom: 0;"></select>
            <button class="btn-gray" style="width: 50px; margin: 0; padding: 14px; font-size: 20px;" onclick="agregarEjercicioCustom()">+</button>
        </div>
        <div id="ultimoEntrenoInfo" style="text-align: center; color: #666; font-size: 13px; margin: 10px 0;"></div>
        <div class="flex-row">
            <input type="number" id="peso" aria-label="Peso" placeholder="kg" data-i18n="ph_peso" inputmode="decimal" style="margin-bottom: 0;">
            <input type="number" id="repeticiones" aria-label="Repeticiones" placeholder="reps" data-i18n="ph_reps" inputmode="numeric" style="margin-bottom: 0;">
        </div>
        <input type="text" id="comentario" aria-label="Comentarios" placeholder="Comentarios (opcional)" data-i18n="ph_nota" style="margin-top: 12px;">
        <button class="btn-blue" onclick="guardarEntrenamiento()" data-i18n="guardar">Guardar</button>
    </div>

    <div class="card">
        <h2 data-i18n="grafico_tit">Análisis</h2>
        <select id="ejercicioGrafico" aria-label="Ejercicio para gráfico" onchange="renderizarGrafico()"></select>
        <canvas id="graficoProgreso"></canvas>
    </div>

    <div class="card">
        <h2 data-i18n="cal_tit">Calendario</h2>
        <input type="date" id="fechaCalendario" aria-label="Fecha" onchange="mostrarHistorialPorFecha()">
        <div id="calendario-container"></div>
    </div>

    <div class="card">
        <h2 data-i18n="rec_tit">Récords</h2>
        <select id="filtroGrupo" aria-label="Filtrar por grupo muscular" onchange="mostrarMejoresEsfuerzos()"></select>
        <div id="historial-container"></div>
    </div>

    <button class="btn-gray" onclick="toggleDatos()" data-i18n="btn_datos" style="background: rgba(255,255,255,0.3); backdrop-filter: blur(10px);">⚙️ Gestión de Datos</button>
    
    <div id="panelDatos" class="card" style="display: none; margin-top: 10px;">
        <button class="btn-green" onclick="exportarCSV()" data-i18n="exp">Exportar CSV</button>
        <div style="background: rgba(255,255,255,0.5); padding: 15px; border-radius: 12px; margin-bottom: 10px;">
            <input type="file" id="archivoCSV" aria-label="Archivo CSV" accept=".csv" style="font-size: 12px; padding: 8px;">
            <button class="btn-gray" onclick="importarCSV()" data-i18n="imp_btn" style="margin-bottom: 0;">Importar CSV</button>
        </div>
        <button class="btn-red" onclick="borrarTodo()" data-i18n="del_btn" style="margin-bottom: 0;">Borrar Datos Perfil</button>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => console.log("PWA Liquid Glass Active"));
        }
    </script>
</body>
</html>
